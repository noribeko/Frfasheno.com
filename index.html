<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Frfasheno is not funny 😂</title>

<style>
body {
    background: linear-gradient(45deg, yellow, pink, cyan);
    text-align: center;
    font-family: Comic Sans MS;
}

h1 {
    font-size: 40px;
    animation: shake 0.5s infinite;
}

@keyframes shake {
    0% { transform: translate(2px, 2px); }
    25% { transform: translate(-2px, -2px); }
    50% { transform: translate(2px, -2px); }
    75% { transform: translate(-2px, 2px); }
    100% { transform: translate(2px, 2px); }
}

textarea {
    width: 300px;
    height: 100px;
    font-size: 16px;
}

button {
    padding: 15px;
    font-size: 18px;
    background-color: red;
    color: white;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.3) rotate(5deg);
    background-color: black;
}

.post {
    background: white;
    color: black;
    margin: 15px;
    padding: 10px;
    border-radius: 20px;
    transform: rotate(-2deg);
}
</style>
</head>

<body>

<h1>😂 Frfasheno is not funny 😂</h1>

<p>Enter the password</p>

<small>The password is abkr</small>


<textarea id="dissText"></textarea>
<br><br>

<button onclick="addDiss()">🔥 Press if you're brave</button>

<h2>🤣 Laughter here</h2>
<div id="posts"></div>

<!-- الصورة داخل الصفحة صح -->
<img src="image.png" width="200">

<!-- الصوت مخفي -->
<audio id="sound" src="sound/Basic_Mode (2) (1) - Copy.mp3"></audio>

<script>
function addDiss() {
    let text = document.getElementById("dissText").value;

    if(text === "") return;

    let post = document.createElement("div");
    post.className = "post";
    post.innerText = text;

    document.getElementById("posts").appendChild(post);

    // تشغيل الصوت عند الضغط
    document.getElementById("sound").play();
}
</script>

</body>
</html>
